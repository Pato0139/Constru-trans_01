{% load gravatar %}
<header class="navbar-custom d-flex justify-content-between align-items-center mb-5 p-4 rounded-4 shadow-lg" style="border: 1px solid var(--color-border) !important;">
    <div class="d-flex align-items-center">
        {% load static %}
        <img src="{% static 'img/Logo1.jpeg' %}" height="40" class="me-3 d-lg-none rounded-2 shadow-accent-glow" alt="Logo">
        <h2 class="h4 fw-900 m-0 text-white" style="font-family: 'Montserrat', sans-serif; letter-spacing: -0.5px;">
            {% block header_title %}Panel de <span class="text-accent">Control</span>{% endblock %}
        </h2>
    </div>

    <div class="d-flex align-items-center gap-4">
        <!-- Selector de Temas Premium -->
        <div class="dropdown me-2">
            <button class="btn btn-link text-muted p-0 dropdown-toggle no-caret" type="button" id="themeSelector" data-bs-toggle="dropdown" aria-expanded="false" title="Cambiar Tema">
                <i class="bi bi-palette-fill fs-5 text-accent"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end p-2 border-0 shadow-lg rounded-4" aria-labelledby="themeSelector" style="background: var(--color-surface); min-width: 200px;">
                <li>
                    <button class="dropdown-item rounded-3 d-flex align-items-center gap-3 py-2" onclick="setTheme('light')">
                        <div class="theme-indicator bg-white border"></div>
                        <span class="fw-700 text-white small">Modo Claro</span>
                    </button>
                </li>
                <li>
                    <button class="dropdown-item rounded-3 d-flex align-items-center gap-3 py-2" onclick="setTheme('dark')">
                        <div class="theme-indicator bg-dark border border-white-10"></div>
                        <span class="fw-700 text-white small">Modo Oscuro</span>
                    </button>
                </li>
                <li>
                    <button class="dropdown-item rounded-3 d-flex align-items-center gap-3 py-2" onclick="setTheme('accessibility')">
                        <div class="theme-indicator bg-warning border"></div>
                        <span class="fw-700 text-white small">Modo Accesible</span>
                    </button>
                </li>
                <li>
                    <button class="dropdown-item rounded-3 d-flex align-items-center gap-3 py-2" onclick="setTheme('daltonico')">
                        <div class="theme-indicator bg-info border"></div>
                        <span class="fw-700 text-white small">Modo Daltonismo</span>
                    </button>
                </li>
            </ul>
        </div>

        <!-- Notificaciones (Simulado) -->
        <div class="d-none d-md-flex align-items-center me-2">
            <button class="btn btn-link text-muted position-relative p-0" title="Notificaciones">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-accent border border-dark rounded-circle"></span>
            </button>
        </div>

        <div class="d-none d-md-block text-end">
            <p class="small text-white fw-800 mb-0">{{ user.get_full_name|default:user.username }}</p>
            <span class="badge-role">{{ user.usuario.rol|title }}</span>
        </div>
        
        <a href="{% url 'usuarios:perfil' %}" class="profile-link position-relative">
            {% if user.usuario.foto_perfil %}
                <img src="{{ user.usuario.foto_perfil.url }}" class="rounded-circle border border-2 border-accent shadow-accent-glow" alt="Perfil" width="48" height="48" style="object-fit: cover;">
            {% else %}
                <img src="{{ user.email|gravatar_url:48 }}" class="rounded-circle border border-2 border-accent shadow-accent-glow" alt="Perfil" width="48" height="48">
            {% endif %}
            <span class="position-absolute bottom-0 end-0 p-1 bg-success border border-dark rounded-circle" title="En línea"></span>
        </a>
    </div>

    <style>
        .no-caret::after { display: none !important; }
        .theme-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        .dropdown-item:hover {
            background: rgba(255,255,255,0.05) !important;
        }
        .border-white-10 { border-color: rgba(255,255,255,0.1) !important; }
        
        .badge-role {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
            color: #000000;
            background: var(--color-accent);
            padding: 3px 10px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.2);
        }
        .profile-link {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .profile-link:hover {
            transform: scale(1.1) rotate(5deg);
        }
        .shadow-accent-glow {
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }
    </style>
</header>
