{% load gravatar %}
<header class="d-flex justify-content-between align-items-center mb-5 p-3 bg-white rounded shadow-sm border-start border-primary border-4">
    <div class="d-flex align-items-center">
        <img src="{% load static %}{% static 'img/Logo1.jpeg' %}" height="40" class="me-3 d-lg-none" alt="Logo">
        <h1 class="h3 fw-bold m-0">Bienvenido</h1>
    </div>

    <div class="d-flex align-items-center gap-2">
        <span class="badge bg-warning text-dark p-2 px-3 fw-bold">{{ user.usuario.rol|title }}</span>
        <img src="{{ user.email|gravatar_url:40 }}" class="rounded-circle border" alt="Profile" width="35" height="35">
    </div>

</header>
