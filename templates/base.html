{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="{% static 'img/Logo1.jpeg' %}" type="image/x-icon">

<title>{% block title %}Panel Administrador{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- AOS Animations -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- SweetAlert2 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

<style>
    :root {
        /* Dark Theme (Default) - Ultra Premium Black & Gold */
        --color-bg: #000000;
        --color-surface: #121212;
        --color-primary: #F39C12; /* Gold */
        --color-secondary: #38517C;
        --color-accent: #0056B3;
        --color-text: #FFFFFF;
        --color-muted: #94a3b8;
        --color-border: rgba(255, 255, 255, 0.08);
        --color-success: #10b981;
        --color-warning: #F39C12;
        --color-danger: #ef4444;
        --color-info: #0ea5e9;
        --glow-primary: rgba(243, 156, 18, 0.2);
        --glow-accent: rgba(0, 86, 179, 0.2);
        --sidebar-bg: #111111;
        --nav-active-bg: rgba(243, 156, 18, 0.1);
        --card-bg: rgba(255, 255, 255, 0.02);
        --item-bg: #0a0a0a;
    }

    [data-theme="light"] {
        /* Light Theme - Clean & Professional */
        --color-bg: #f8fafc;
        --color-surface: #ffffff;
        --color-primary: #d97706;
        --color-secondary: #e2e8f0;
        --color-accent: #2563eb;
        --color-text: #0f172a;
        --color-muted: #475569;
        --color-border: rgba(0, 0, 0, 0.1);
        --sidebar-bg: #ffffff;
        --nav-active-bg: #fff7ed;
        --card-bg: #ffffff;
        --item-bg: #f1f5f9;
    }

    [data-theme="accessibility"] {
        /* High Contrast Theme */
        --color-bg: #000000;
        --color-surface: #000000;
        --color-primary: #ffff00;
        --color-secondary: #ffffff; 
        --color-accent: #00ffff;
        --color-text: #ffffff;
        --color-muted: #ffff00;
        --color-border: #ffffff;
        --color-success: #00ff00;
        --color-warning: #ffff00;
        --color-danger: #ff0000;
        --sidebar-bg: #000000;
        --nav-active-bg: #ffff00;
        --card-bg: #000000;
        --item-bg: #000000;
        font-weight: 500;
    }

    /* --- SVG FILTERS PARA DALTONISMO --- */
    /* Estos filtros se inyectan al final del body */

    body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        transition: background-color 0.3s, color 0.3s;
    }

    main {
        background-color: var(--color-bg) !important;
        min-height: 100vh;
    }

    .card, .navbar-custom, .sidebar-custom, .modal-content {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
        border-color: var(--color-border) !important;
    }

    /* Estilos para inputs, select y textarea */
    input, select, textarea, .form-control, .form-select {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
        border: 1px solid var(--color-border) !important;
    }

    input:focus, select:focus, textarea:focus {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
        border-color: var(--color-primary) !important;
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25) !important;
    }

    /* Estilo para las opciones del select */
    option {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
    }

    /* Para asegurar que en modo oscuro/accesibilidad sea negro total si se requiere */
    /* Forzar texto negro en botones amarillos para alto contraste */
    [data-theme="accessibility"] .btn-primary, 
    [data-theme="accessibility"] .btn-gold,
    [data-theme="accessibility"] .badge-tipo {
        color: #000000 !important;
        font-weight: 900 !important;
    }

    .text-white { color: var(--color-text) !important; }
    .text-muted { color: var(--color-muted) !important; }

    /* Tooltips customization */
    .tooltip-inner {
        background-color: var(--color-accent) !important;
        color: #000 !important;
        font-weight: 700;
    }
</style>

<script>
    // Theme logic
    const savedTheme = localStorage.getItem('theme') || 'dark';
    const savedDaltonism = localStorage.getItem('daltonism') || 'none';
    
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.documentElement.setAttribute('data-daltonism', savedDaltonism);

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }

    function setDaltonism(mode) {
        document.documentElement.setAttribute('data-daltonism', mode);
        localStorage.setItem('daltonism', mode);
    }
</script>

</head>

<body>

<div class="container-fluid p-0">
<div class="d-flex">

{% include "sidebar.html" %}

<main class="flex-grow-1 p-3 overflow-auto" style="min-height: 100vh;">

{% include "navbar.html" %}

{% block content %}
{% endblock %}

{% include "footer.html" %}

</main>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// Initialize AOS
AOS.init({
    duration: 800,
    once: true,
    easing: 'ease-in-out'
});

// Desactivar alertas de DataTables y redirigirlas a la consola para evitar ventanas emergentes
$.fn.dataTable.ext.errMode = 'throw';

$(document).ready(function() {
    $('.table:not(.no-datatable)').DataTable({
        "language": {
            "url": "//cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json",
            "search": "Buscar:",
            "lengthMenu": "Mostrar _MENU_ registros por página",
            "zeroRecords": "No se encontraron resultados",
            "info": "Mostrando página _PAGE_ de _PAGES_",
            "infoEmpty": "No hay registros disponibles",
            "infoFiltered": "(filtrado de _MAX_ registros totales)",
            "paginate": {
                "first": "Primero",
                "last": "Último",
                "next": "Siguiente",
                "previous": "Anterior"
            }
        },
        "pageLength": 10,
        "responsive": true,
        "dom": '<"d-flex justify-content-between align-items-center mb-3"lf>rt<"d-flex justify-content-between align-items-center mt-3"ip>'
    });

    // Custom SweetAlert for Django Messages
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: '{{ message.tags|default:"info" }}' === 'error' ? 'error' : ('{{ message.tags }}' === 'success' ? 'success' : 'info'),
                title: '{{ message.tags|title|escapejs }}',
                text: '{{ message|escapejs }}',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 5000,
                timerProgressBar: true,
                background: '#1a1a1a',
                color: '#ffffff',
                iconColor: '{{ message.tags }}' === 'success' ? '#10b981' : ('{{ message.tags }}' === 'error' ? '#ef4444' : '#F39C12'),
                customClass: {
                    popup: 'rounded-4 border-white-10 shadow-2xl'
                }
            });
        {% endfor %}
    {% endif %}
});
</script>

<!-- SVG Filters for Daltonism -->
<svg style="display:none">
  <defs>
    <filter id="protanopia-filter">
      <feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0 0.558, 0.442, 0, 0, 0 0, 0.242, 0.758, 0, 0 0, 0, 0, 1, 0"/>
    </filter>
    <filter id="deuteranopia-filter">
      <feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0 0.7, 0.3, 0, 0, 0 0, 0.3, 0.7, 0, 0 0, 0, 0, 1, 0"/>
    </filter>
    <filter id="tritanopia-filter">
      <feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0 0, 0.433, 0.567, 0, 0 0, 0.475, 0.525, 0, 0 0, 0, 0, 1, 0"/>
    </filter>
  </defs>
</svg>

<script>
// Global Input Validation
$(document).on('input', '.numeric-only', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
});

$(document).on('input', '.alphanumeric-only', function() {
    this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
});

$(document).on('input', '.plate-only', function() {
    // Alfanumérico y mayúsculas para placas
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

// Global Delete Confirmation with SweetAlert2
$(document).on('click', '.confirm-delete', function(e) {
    e.preventDefault();
    const url = $(this).attr('href');
    const title = $(this).data('title') || '¿Estás seguro?';
    const text = $(this).data('text') || 'Esta acción no se puede deshacer.';
    
    Swal.fire({
        title: title,
        text: text,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#ffffff',
        customClass: {
            popup: 'rounded-4 border-white-10 shadow-2xl'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = url;
        }
    });
});
</script>

</body>
</html>
