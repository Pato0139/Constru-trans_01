{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="{% static 'img/Logo1.jpeg' %}" type="image/x-icon">

<title>{% block title %}Panel Administrador{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">

<!-- SweetAlert2 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/theme.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

<style>
    body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Montserrat', sans-serif;
        margin: 0;
    }

    main {
        background-color: var(--color-bg) !important;
        min-height: 100vh;
    }

    .card, .navbar-custom, .sidebar-custom, .modal-content {
        background-color: var(--color-surface);
        color: var(--color-text);
        border-color: var(--color-border);
    }

    /* Estilos para inputs, select y textarea */
    input, select, textarea, .form-control, .form-select {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
        border: 1px solid var(--color-border) !important;
    }

    input:focus, select:focus, textarea:focus {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
        border-color: var(--color-primary) !important;
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25) !important;
    }

    /* Estilo para las opciones del select */
    option {
        background-color: var(--color-surface) !important;
        color: var(--color-text) !important;
    }

    /* Para asegurar que en modo oscuro/accesibilidad sea negro total si se requiere */
    /* Forzar texto negro en botones amarillos para alto contraste */
    [data-theme="accessibility"] .btn-primary, 
    [data-theme="accessibility"] .btn-gold,
    [data-theme="accessibility"] .badge-tipo {
        color: #000000 !important;
        font-weight: 900 !important;
    }

    .text-white { color: var(--color-text) !important; }
    .text-muted { color: var(--color-muted) !important; }

    /* Tooltips customization */
    .tooltip-inner {
        background-color: var(--color-accent) !important;
        color: #000 !important;
        font-weight: 700;
    }
</style>

<script>
    // Theme logic
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
</script>

</head>

<body>

<div class="container-fluid p-0">
<div class="d-flex">

{% include "sidebar.html" %}

<main class="flex-grow-1 p-4 overflow-auto" style="min-height: 100vh;">

{% include "navbar.html" %}

{% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% for message in messages %}
                Swal.fire({
                    icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
                    title: "{% if message.tags == 'error' %}¡Error!{% elif message.tags == 'success' %}¡Éxito!{% elif message.tags == 'warning' %}¡Atención!{% else %}Información{% endif %}",
                    text: "{{ message }}",
                    confirmButtonColor: 'var(--color-primary)',
                    background: 'var(--color-surface)',
                    color: 'var(--color-text)'
                });
            {% endfor %}
        });
    </script>
{% endif %}

{% block content %}
{% endblock %}

{% include "footer.html" %}

</main>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

<script>
// Desactivar alertas de DataTables y redirigirlas a la consola para evitar ventanas emergentes
$.fn.dataTable.ext.errMode = 'throw';

$(document).ready(function() {
    $('.table:not(.no-datatable)').DataTable({
        "language": {
            "url": "//cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json",
            "search": "Buscar:",
            "lengthMenu": "Mostrar _MENU_ registros por página",
            "zeroRecords": "No se encontraron resultados",
            "info": "Mostrando página _PAGE_ de _PAGES_",
            "infoEmpty": "No hay registros disponibles",
            "infoFiltered": "(filtrado de _MAX_ registros totales)",
            "paginate": {
                "first": "Primero",
                "last": "Último",
                "next": "Siguiente",
                "previous": "Anterior"
            }
        },
        "pageLength": 10,
        "responsive": true
    });
});
</script>

</body>
</html>
