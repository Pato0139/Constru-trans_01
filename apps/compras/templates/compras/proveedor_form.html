{% extends "base.html" %}

{% block title %}{{ action }} Proveedor - ConstruTrans{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white mb-0">
            <i class="fas fa-truck-loading me-2"></i> {{ action }} Proveedor
        </h2>
        <a href="{% url 'compras:lista_proveedores' %}" class="btn btn-outline-light">
            <i class="fas fa-arrow-left me-1"></i> Volver
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-dark border-secondary shadow-lg glass-card">
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">Nombre de la Empresa / Razón Social</label>
                                <input type="text" name="nombre_empresa" class="form-control" required value="{{ proveedor.nombre_empresa|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">NIT</label>
                                <input type="text" name="nit" class="form-control" required value="{{ proveedor.nit|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">Nombre de Contacto</label>
                                <input type="text" name="contacto_nombre" class="form-control" required value="{{ proveedor.contacto_nombre|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">Categoría</label>
                                <input type="text" name="categoria" class="form-control" placeholder="Ej: Materiales, Repuestos..." value="{{ proveedor.categoria|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">Teléfono</label>
                                <input type="text" name="telefono" class="form-control" required value="{{ proveedor.telefono|default:'' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="text-white-50 mb-2">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control" required value="{{ proveedor.email|default:'' }}">
                            </div>
                            <div class="col-12">
                                <label class="text-white-50 mb-2">Dirección</label>
                                <input type="text" name="direccion" class="form-control" required value="{{ proveedor.direccion|default:'' }}">
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top border-secondary text-end">
                            <button type="submit" class="btn btn-warning px-5 fw-bold text-uppercase">
                                <i class="fas fa-save me-2"></i> Guardar Proveedor
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .glass-card {
        background: rgba(30, 34, 45, 0.7) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    .form-control {
        background-color: rgba(0,0,0,0.2) !important;
        border-color: rgba(255,255,255,0.1) !important;
        color: white !important;
    }
</style>
{% endblock %}
