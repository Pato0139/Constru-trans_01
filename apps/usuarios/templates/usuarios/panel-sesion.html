{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Acceso - Constru-trans{% endblock %}</title>
    
    <!-- Favicon / Logo en pestaña -->
    <link rel="icon" type="image/jpeg" href="{% static 'img/Logo1.jpeg' %}">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{% static 'css/loader.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    
    <style>
        .illustration-circle {
            background-image: url('{% static "img/Logo1.jpeg" %}');
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="particles-js"></div>

<div id="loader-container">
    <img src="{% static 'img/Logo1.jpeg' %}" class="loader-img" alt="Cargando...">
    <div class="loader">
        <div class="progress-bar"></div>
    </div>
    <p>Cargando Constru-trans...</p>
</div>

    <div class="auth-master-card animate__animated animate__fadeIn">
        <div class="auth-form-section">
            <div class="auth-brand d-flex align-items-center justify-content-between w-100">
                <div class="d-flex align-items-center">
                    <img src="{% static 'img/Logo1.jpeg' %}" alt="Logo" class="brand-icon">
                    CONSTRU<span>-TRANS</span>
                </div>
                <a href="{% url 'inicio:inicio' %}" class="btn-back-home d-none d-sm-block">
                    <i class="bi bi-house-door-fill me-1"></i> Volver al Inicio
                </a>
                <a href="{% url 'inicio:inicio' %}" class="btn-back-home d-sm-none">
                    <i class="bi bi-house-door-fill"></i>
                </a>
            </div>
            
            {% block content %}
            {% endblock %}
        </div>

        <div class="auth-visual-section">
            <div class="illustration-wrapper">
                <div class="illustration-circle animate__animated animate__zoomIn"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/loader.js' %}"></script>
    {% block extra_js %}{% endblock %}
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#F39C12", "#0056B3", "#ffffff"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.05, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
