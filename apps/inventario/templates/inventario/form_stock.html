{% extends "base.html" %}

{% block title %}Ajustar Stock - Constru-trans{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="table-container p-4 p-md-5 border-0 shadow-lg" style="background: rgba(255,255,255,0.02); border-radius: 32px;">
            <div class="text-center mb-5">
                <div class="bg-accent rounded-circle p-3 d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px;">
                    <i class="bi bi-archive text-dark fs-2"></i>
                </div>
                <h3 class="fw-900 text-white mb-2">Ajustar Stock</h3>
                <p class="text-muted small text-uppercase fw-700">{{ stock.material.nombre }}</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Cantidad en Stock</label>
                    <input type="text" name="cantidad" class="form-control numeric-only" value="{{ stock.cantidad }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Ubicación en Bodega</label>
                    <input type="text" name="ubicacion" class="form-control" value="{{ stock.ubicacion }}" required>
                </div>

                <div class="d-grid gap-3 mt-4">
                    <button type="submit" class="btn btn-gold rounded-pill py-3 fw-900 text-uppercase">Actualizar Inventario</button>
                    <a href="{% url 'inventario:stock_lista' %}" class="btn btn-outline-light rounded-pill py-2">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
