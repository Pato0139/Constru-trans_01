{% extends "Cliente/base_cliente.html" %}

{% block content %}

<h3 class="mb-4">Realizar pedido</h3>

<div class="card shadow-sm col-md-6">

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Material</label>
<div class="mb-4">
                    <label for="material" class="block text-gray-700 font-bold mb-2">Material</label>
                    <select id="material" name="material" class="w-full border border-gray-300 p-2 rounded">
                        <option value="">Seleccione un material</option>
                        <option value="arena">Arena</option>
                        <option value="grava">Grava</option>
                        <option value="cemento">Cemento</option>
                        <option value="ladrillos">Ladrillos</option>
                    </select>
                </div> 


</div>

<div class="mb-3">
<label class="form-label">Cantidad</label>
<input type="number" name="cantidad" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Dirección de entrega</label>
<input type="text" name="direccion" class="form-control" required>
</div>

<button class="btn btn-primary">
<i class="bi bi-check-lg"></i> Crear pedido
</button>

</form>

</div>
</div>

{% endblock %}
